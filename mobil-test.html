<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Mobil-Vorschau — Galerie JP</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #17140f;
      font-family: system-ui, sans-serif;
    }
    .telefon {
      width: 410px;
      height: 880px;
      border: 10px solid #2b2721;
      border-radius: 38px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
    }
    iframe { width: 100%; height: 100%; border: none; display: block; }
    p { color: #8d857a; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div>
    <p>Mobil-Vorschau (410 × 880, Touch-Modus)</p>
    <div class="telefon">
      <iframe src="/?touch=1" title="Galerie JP mobil"></iframe>
    </div>
  </div>
</body>
</html>
